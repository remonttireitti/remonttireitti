name: Scheduled cron jobs

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Expire marketplace listings (04:00 UTC)
        if: github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          curl -fsS -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.SITE_URL }}/api/cron/expire-listings"

      - name: Expire pending acceptances (05:00 UTC)
        if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          curl -fsS -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.SITE_URL }}/api/cron/expire-pending-acceptances"

      - name: Review reminders (06:00 UTC)
        if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          curl -fsS -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.SITE_URL }}/api/cron/review-reminders"

      - name: Expire stale projects (07:00 UTC)
        if: github.event.schedule == '0 7 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          curl -fsS -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.SITE_URL }}/api/cron/expire-stale-projects"
