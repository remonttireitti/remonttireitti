name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Upload worker secrets
        continue-on-error: true
        run: |
          printf '%s\n' \
            "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
            "CRON_SECRET=${{ secrets.CRON_SECRET }}" \
            > /tmp/worker.secrets
          npx wrangler secret bulk /tmp/worker.secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build and deploy
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://remonttireitti.fi
          NEXT_PUBLIC_COMPANY_NAME: Remonttireitti
          NEXT_PUBLIC_COMPANY_EMAIL: info@remonttireitti.fi
          NEXT_PUBLIC_PRIVACY_EMAIL: info@remonttireitti.fi
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: Remonttireitti <noreply@remonttireitti.fi>
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BOOTSTRAP_ADMIN_EMAIL: info@remonttireitti.fi
