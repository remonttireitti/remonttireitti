# Naytot: IV -> Pohjakuva -> Sahkon hinta -> WiFi (viimeinen). Vierita vasemmalle/oikealle.
image:
  - file: images/pohjakuva.png
    id: floor_plan
    resize: 1000x468
    type: RGB565
  - file: images/ilmanvaihto-diagram.png
    id: iv_diagram
    resize: 1000x468
    type: RGB565

lvgl:
  byte_order: little_endian
  disp_bg_color: 0xFAFAF9
  draw_rounding: 1
  update_interval: never
  page_wrap: false
  displays:
    - main_display
  touchscreens:
    - hub_touch
  pages:
    # --- 1. Ilmanvaihto (kaavio, ei pohjakuvaa) ---
    - id: iv_page
      bg_color: 0xFAFAF9
      bg_opa: cover
      on_load:
        - lambda: "id(display_page_idx) = 0;"
      widgets:
        - label:
            align: TOP_LEFT
            x: 20
            y: 10
            text_color: 0x1C1917
            text: "Ilmanvaihto"
        - label:
            id: iv_timer
            align: TOP_RIGHT
            x: -20
            y: 10
            text_color: 0xD97706
            text: ""
        - button:
            press_lock: false
            x: 250
            y: 4
            width: 56
            height: 30
            bg_opa: transp
            border_width: 0
            widgets:
              - label:
                  align: CENTER
                  text_color: 0x1C1917
                  text: "IV"
        - button:
            press_lock: false
            x: 318
            y: 4
            width: 64
            height: 30
            bg_opa: transp
            border_width: 0
            on_click:
              - lvgl.page.show: floor_page
            widgets:
              - label:
                  align: CENTER
                  text_color: 0x78716C
                  text: "Koti"
