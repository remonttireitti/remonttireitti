# Naytot: IV -> Pohjakuva -> Sahkon hinta -> WiFi (viimeinen). Vierita vasemmalle/oikealle.
image:
  - file: images/pohjakuva.png
    id: floor_plan
    resize: 1000x468
    type: RGB565

lvgl:
  byte_order: little_endian
  disp_bg_color: 0xFAFAF9
  draw_rounding: 1
  update_interval: never
  displays:
    - main_display
  touchscreens:
    - hub_touch
  pages:
    # --- 1. Ilmanvaihto (pohjakuva, kuten web) ---
    - id: iv_page
      bg_color: 0xFAFAF9
      bg_opa: cover
      on_swipe_left:
        - script.execute: nav_page_next
      on_swipe_right:
        - script.execute: nav_page_prev
      widgets:
        - label:
            align: TOP_LEFT
            x: 20
            y: 10
            text_color: 0x1C1917
            text: "Ilmanvaihto"
        - label:
            id: lv_dots_iv
            align: TOP_MID
            y: 10
            text_color: 0x78716C
            text: "*IV*  Koti  Sahko  WiFi"
        - button:
            x: 318
            y: 4
            width: 64
            height: 30
            bg_opa: transp
            border_width: 0
            on_click:
              - script.execute:
                  id: nav_goto
                  page: 1
            widgets:
              - label:
                  align: CENTER
                  text_color: 0x78716C
                  text: "Koti"
        - button:
            x: 392
            y: 4
            width: 72
            height: 30
            bg_opa: transp
            border_width: 0
            on_click:
              - script.execute:
                  id: nav_goto
