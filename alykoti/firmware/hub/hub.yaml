script:
  - id: refresh_airfi_online
    mode: restart
    then:
      - lambda: |-
          auto valid_temp = [](float v) {
            return !isnan(v) && v >= -50.0f && v <= 80.0f;
          };
          auto looks_like_fan_pct = [&](float v) {
            if (!valid_temp(v)) return true;
            auto near = [](float a, float b) { return fabsf(a - b) < 0.6f; };
            if (id(fan_supply_pct).has_state() && near(v, id(fan_supply_pct).state)) return true;
            if (id(fan_exhaust_pct).has_state() && near(v, id(fan_exhaust_pct).state)) return true;
            if (id(airfi_supply_fan).has_state() && near(v, id(airfi_supply_fan).state)) return true;
            if (id(airfi_exhaust_fan).has_state() && near(v, id(airfi_exhaust_fan).state)) return true;
            return false;
          };
          auto publish_temp = [&](float v, esphome::sensor::Sensor *sens) -> bool {
            if (!valid_temp(v) || looks_like_fan_pct(v)) return false;
            if (sens != nullptr) sens->publish_state(v);
            return true;
          };
          bool ok = false;

          auto *modbus = id(airfi_modbus);
          if (modbus != nullptr) {
            // Yksi lohkoluku rek 3-7 (T1, T2 varalla, T3, T4, T5) — AirFi v2.9 / virallinen sovellus
            auto resp = modbus->read_registers(3, 5, modbus_tcp::ModbusFunction::READ_INPUT_REGISTERS);
            if (resp.success && resp.data.size() >= 5) {
              if (publish_temp(((int16_t) resp.data[0]) * 0.1f, id(airfi_outdoor_temp))) ok = true;
              if (publish_temp(((int16_t) resp.data[2]) * 0.1f, id(airfi_exhaust_temp))) ok = true;
              if (publish_temp(((int16_t) resp.data[3]) * 0.1f, id(airfi_exhaust_hru_temp))) ok = true;
              if (publish_temp(((int16_t) resp.data[4]) * 0.1f, id(airfi_supply_room_temp))) ok = true;
            }
          }

          if (!ok) {
            if (id(airfi_outdoor_temp).has_state() && publish_temp(id(airfi_outdoor_temp).state, nullptr)) ok = true;
            if (!ok && id(airfi_exhaust_temp).has_state() && publish_temp(id(airfi_exhaust_temp).state, nullptr)) ok = true;
            if (!ok && id(airfi_supply_room_temp).has_state() && publish_temp(id(airfi_supply_room_temp).state, nullptr)) ok = true;
            if (!ok && id(airfi_exhaust_hru_temp).has_state() && publish_temp(id(airfi_exhaust_hru_temp).state, nullptr)) ok = true;
          }
          id(airfi_online_flag) = ok;

  - id: handle_swipe_release
    mode: restart
    then:
      - lambda: |-
          if (!id(swipe_active)) return;
          id(swipe_active) = false;
          if (id(swipe_y0) < 48 || id(swipe_y0) > 500) return;
          uint32_t now = millis();
          if (now < id(nav_swipe_lock_until)) return;
          int dx = id(swipe_x1) - id(swipe_x0);
          int dy = id(swipe_y1) - id(swipe_y0);
          if (abs(dx) < 40) return;
          if (abs(dy) * 2 > abs(dx)) return;
          id(nav_swipe_lock_until) = now + 300;
          int p = id(display_page_idx);
          if (dx < 0 && p < 3) id(nav_goto).execute(p + 1);
          if (dx > 0 && p > 0) id(nav_goto).execute(p - 1);

  - id: nav_goto
    mode: restart
    parameters:
      page: int
    then:
      - lambda: |-
          if (page < 0) page = 0;
          if (page > 3) page = 3;
          id(display_page_idx) = page;
      - if:
          condition:
            lambda: "return page == 0;"
          then:
            - lvgl.page.show: iv_page
      - if:
          condition:
            lambda: "return page == 1;"
          then:
            - lvgl.page.show: floor_page
      - if:
          condition:
            lambda: "return page == 2;"
          then:
            - lvgl.page.show: price_page
      - if:
          condition:
            lambda: "return page == 3;"
          then:
            - lvgl.page.show: wifi_page

  - id: fetch_spot_prices
    mode: single
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - http_request.get:
                url: "https://api.spot-hinta.fi/TodayAndDayForward?region=FI"
                capture_response: true
                max_response_buffer_size: 65536
                on_response:
                  - lambda: |-
                      if (response->status_code != 200) return;

                      float hours[48] = {0};
                      int counts[48] = {0};
                      float min_c = 9999.0f;
                      float max_c = 0.0f;
                      float sum_c = 0.0f;
                      int sum_n = 0;
                      float cur_c = NAN;
                      float next_c = NAN;
                      bool have_next = false;
                      time_t now_ts = ::time(nullptr);
                      struct tm tm_now;
                      localtime_r(&now_ts, &tm_now);
                      char today_key[11];
                      snprintf(today_key, sizeof(today_key), "%04d-%02d-%02d",
                               tm_now.tm_year + 1900, tm_now.tm_mon + 1, tm_now.tm_mday);
                      struct tm tm_tom = tm_now;
                      tm_tom.tm_mday += 1;
                      mktime(&tm_tom);
                      char tomorrow_key[11];
                      snprintf(tomorrow_key, sizeof(tomorrow_key), "%04d-%02d-%02d",
                               tm_tom.tm_year + 1900, tm_tom.tm_mon + 1, tm_tom.tm_mday);
                      int now_h = tm_now.tm_hour;
                      int now_slot = tm_now.tm_min / 15;

                      JsonDocument doc = json::parse_json(body);
                      if (doc.isNull() || doc.overflowed()) return;
                      JsonArray arr = doc.as<JsonArray>();
                      if (arr.isNull()) return;

                      for (JsonObject row : arr) {
                        const char *dt = row["DateTime"] | "";
                        if (strlen(dt) < 16) continue;
                        char day_key[11];
                        memcpy(day_key, dt, 10);
                        day_key[10] = '\0';
                        int day_off = -1;
                        if (strcmp(day_key, today_key) == 0) day_off = 0;
                        else if (strcmp(day_key, tomorrow_key) == 0) day_off = 1;
                        else continue;
                        int hour = (dt[11] - '0') * 10 + (dt[12] - '0');
                        int minute = (dt[14] - '0') * 10 + (dt[15] - '0');
                        if (hour < 0 || hour > 23) continue;
                        float cents = row["PriceWithTax"].as<float>() * 100.0f;
                        int idx = day_off * 24 + hour;
                        if (idx < 0 || idx > 47) continue;
                        hours[idx] += cents;
                        counts[idx]++;
                        if (day_off == 0) {
                          if (cents < min_c) min_c = cents;
                          if (cents > max_c) max_c = cents;
                          sum_c += cents;
                          sum_n++;
                        }
                        if (day_off == 0 && hour == now_h && (minute / 15) == now_slot) {
                          cur_c = cents;
                        }
                        if (isnan(cur_c) && day_off == 0 && hour == now_h && minute / 15 > now_slot) {
                          next_c = cents;
                          have_next = true;
                        }
                      }

                      for (int i = 0; i < 48; i++) {
                        if (counts[i] > 0) hours[i] /= counts[i];
                      }
                      if (sum_n == 0) return;

                      if (isnan(cur_c)) {
                        int idx = now_h;
                        if (counts[idx] > 0) cur_c = hours[idx];
                      }
                      if (!have_next) {
                        int idx = now_h + 1;
                        if (idx < 24 && counts[idx] > 0) next_c = hours[idx];
                        else if (counts[24] > 0) next_c = hours[24];
                        else next_c = cur_c;
                      }

                      id(el_price_now) = cur_c;
                      id(el_price_next) = next_c;
                      id(el_price_min) = min_c;
                      id(el_price_max) = max_c;
                      id(el_price_avg) = sum_c / sum_n;

                      float span = max_c - min_c;
                      if (span < 0.05f) span = 1.0f;

                      auto set_bar = [&](int idx, lv_obj_t *bar) {
                        if (counts[idx] <= 0) {
                          lv_bar_set_value(bar, 0, LV_ANIM_OFF);
                          return;
                        }
                        int v = (int) ((hours[idx] - min_c) / span * 100.0f);
                        if (v < 0) v = 0;
                        if (v > 100) v = 100;
                        lv_bar_set_value(bar, v, LV_ANIM_OFF);
                      };

                      set_bar(0, id(price_bar_0));
                      set_bar(1, id(price_bar_1));
                      set_bar(2, id(price_bar_2));
                      set_bar(3, id(price_bar_3));
                      set_bar(4, id(price_bar_4));
                      set_bar(5, id(price_bar_5));
                      set_bar(6, id(price_bar_6));
                      set_bar(7, id(price_bar_7));
                      set_bar(8, id(price_bar_8));
                      set_bar(9, id(price_bar_9));
                      set_bar(10, id(price_bar_10));
                      set_bar(11, id(price_bar_11));
                      set_bar(12, id(price_bar_12));
                      set_bar(13, id(price_bar_13));
                      set_bar(14, id(price_bar_14));
                      set_bar(15, id(price_bar_15));
                      set_bar(16, id(price_bar_16));
                      set_bar(17, id(price_bar_17));
