# Guition ESP32-P4 keskusyksikkö — ESPHome
# Flash: esphome run hub.yaml

substitutions:
  device_name: alykoti-hub
  friendly_name: "Alykoti keskusyksikko"
  firmware_version: "1.2.1"

  upload_port: COM7

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.1.0
  platformio_options:
    upload_port: ${upload_port}
  on_boot:
    - priority: -250
      then:
        - lambda: |-
            // JC1060P470C näytön virransyöttö (Guition-yhteisö)
            gpio_set_direction(GPIO_NUM_27, GPIO_MODE_OUTPUT);
            gpio_set_level(GPIO_NUM_27, 0);
            vTaskDelay(pdMS_TO_TICKS(5));
            gpio_set_level(GPIO_NUM_27, 1);
            vTaskDelay(pdMS_TO_TICKS(10));
            gpio_set_level(GPIO_NUM_27, 0);
            vTaskDelay(pdMS_TO_TICKS(120));
            gpio_set_direction(GPIO_NUM_22, GPIO_MODE_OUTPUT);
            gpio_set_level(GPIO_NUM_22, 0);
            vTaskDelay(pdMS_TO_TICKS(10));
            gpio_set_level(GPIO_NUM_22, 1);
            vTaskDelay(pdMS_TO_TICKS(100));
    - priority: -100
      then:
        - lambda: |-
            const char *reason = "unknown";
            switch (esp_reset_reason()) {
              case ESP_RST_POWERON: reason = "poweron"; break;
              case ESP_RST_SW: reason = "software"; break;
              case ESP_RST_PANIC: reason = "panic"; break;
              case ESP_RST_INT_WDT: reason = "int_wdt"; break;
              case ESP_RST_TASK_WDT: reason = "task_wdt"; break;
              case ESP_RST_WDT: reason = "wdt"; break;
              case ESP_RST_BROWNOUT: reason = "brownout"; break;
              case ESP_RST_SDIO: reason = "sdio"; break;
              default: break;
            }
            ESP_LOGW("boot", "Reset reason: %s", reason);
        - logger.log: "Alykoti keskusyksikko kaynnistyi"
    - priority: 600
      then:
        - delay: 2s
        - light.turn_on: display_backlight

esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHz
  engineering_sample: true
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true
      enable_idf_experimental_features: true
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: "y"
      CONFIG_FREERTOS_THREAD_LOCAL_STORAGE_POINTERS: "1"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "16384"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"

psram:
  mode: hex
  speed: 200MHz

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 0s
  power_save_mode: NONE
  fast_connect: true
  enable_on_boot: true
  min_auth_mode: WPA2
  ap:
    ssid: "Alykoti-Setup"
    password: !secret ota_password

# captive_portal pois: wifi on secrets.yaml:ssa, valttaa ylimaaraisen http-palvelimen

# web_server pois toistaiseksi: vahentaa kuormaa WiFi-yhteyden jalkeen
# web_server:
#   port: 80
#   version: 3
#   include_internal: true

preferences:
  flash_write_interval: 5min

http_request:
  id: http_client
  timeout: 10s
  watchdog_timeout: 30s

external_components:
  - source: github://Gucioo/esphome_modbus_tcp_master
    components: [modbus_tcp_manager]
    refresh: 0s

# --- AirFi Modbus TCP (hub toimii siltana pilven ja lähiverkon välillä) ---
modbus_tcp_manager:
  id: airfi_modbus
  host: !secret airfi_modbus_host
  port: 502
  unit_id: 1

binary_sensor:
  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    name: "AirFi yhteys"
    id: airfi_connected
    internal: true

# --- Naytto JC1060P470 (MIPI-DSI + taustavalo) ---
# ASCII-only tekstit: laitefontti ei tue a/o/2-alaindeksia luotettavasti.

esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: true

output:
  - platform: ledc
    pin: GPIO23
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: "Näytön taustavalo"
    id: display_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    gamma_correct: 1.0

display:
  - platform: mipi_dsi
    id: main_display
    model: JC1060P470
    reset_pin:
      number: GPIO05
    update_interval: never
    auto_clear_enabled: false
    hsync_pulse_width: 20

lvgl:
  byte_order: little_endian
  disp_bg_color: black
  draw_rounding: 1
  update_interval: 2s
  displays:
    - main_display
  pages:
    - id: status_page
      bg_color: black
      bg_opa: cover
      widgets:
        - label:
            align: TOP_MID
            y: 30
            text_color: white
            text: "Alykoti keskusyksikko"
        - label:
            id: lvgl_co2
            align: CENTER
            y: -20
            text_color: white
            text: "CO2: -- ppm"
        - label:
            id: lvgl_fan_supply
            align: CENTER
            y: -5
            text_color: white
            text: "Tulo: --%"
        - label:
            id: lvgl_fan_exhaust
            align: CENTER
            y: 25
            text_color: white
            text: "Poisto: --%"
        - label:
            id: lvgl_wifi
            align: BOTTOM_MID
            y: -70
            text_color: white
            text: "WiFi: yhdistetaan..."
        - label:
            id: lvgl_web
            align: BOTTOM_MID
            y: -30
            text_color: white
            text: "Web: Alykoti-Setup"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP-osoite"
      id: wifi_ip
    ssid:
      name: "WiFi-verkko"
      id: wifi_ssid_connected

# --- Airthings: pilvi-API webin kautta (BLE pois, View Plus) ---
# CO2 tulee synkista. BLE tarvitaan vain jos haluat suoran yhteyden anturiin.
sensor:
  - platform: template
    name: "CO2 (kaytossa)"
    id: effective_co2
    unit_of_measurement: "ppm"
    accuracy_decimals: 0
    update_interval: never
    lambda: |-
      if (id(cloud_co2_ppm) > 0) return id(cloud_co2_ppm);
      return {};
    on_value:
      - lvgl.label.update:
          id: lvgl_co2
          text: !lambda |-
            char buf[32];
            snprintf(buf, sizeof(buf), "CO2: %d ppm", (int) x);
            return std::string(buf);

  - platform: template
    name: "Tuloilma (AirFi)"
    id: fan_supply_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: never
    lambda: "return {};"
    on_value:
      - lvgl.label.update:
          id: lvgl_fan_supply
          text: !lambda |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Tulo: %d%%", (int) x);
            return std::string(buf);

  - platform: template
    name: "Poistoilma (AirFi)"
    id: fan_exhaust_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: never
    lambda: "return {};"
    on_value:
      - lvgl.label.update:
          id: lvgl_fan_exhaust
          text: !lambda |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Poisto: %d%%", (int) x);
            return std::string(buf);

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_outdoor_temp
    name: "AirFi T1 ulkoilma"
    register_address: 3
    function_code: 4
    scale: 0.1
    update_interval: 30s
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_supply_hru_temp
    name: "AirFi T2 tulo LTO"
    register_address: 4
    function_code: 4
    scale: 0.1
    update_interval: 30s
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_exhaust_temp
    name: "AirFi T3 poisto"
    register_address: 5
    function_code: 4
    scale: 0.1
    update_interval: 30s
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_supply_room_temp
    name: "AirFi T4 tulo huone"
    register_address: 6
    function_code: 4
    scale: 0.1
    update_interval: 30s
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_exhaust_hru_temp
    name: "AirFi T5 jateilma"
    register_address: 7
    function_code: 4
    scale: 0.1
    update_interval: 30s
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_exhaust_fan
    name: "AirFi poistonopeus"
    register_address: 11
    function_code: 4
    scale: 1.0
    update_interval: 30s
    internal: true
    on_value:
      - lambda: |-
          id(fan_exhaust_pct).publish_state(x);

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_supply_fan
    name: "AirFi tulonopeus"
    register_address: 12
    function_code: 4
    scale: 1.0
    update_interval: 30s
    internal: true
    on_value:
      - lambda: |-
          id(fan_supply_pct).publish_state(x);

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_supply_airflow
    name: "AirFi tuloilmamaara"
    register_address: 44
    function_code: 4
    scale: 1.0
    update_interval: 60s
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_exhaust_airflow
    name: "AirFi poistoilmamaara"
    register_address: 45
    function_code: 4
    scale: 1.0
    update_interval: 60s
    internal: true

# --- AirFi ohjaus: hub kirjoittaa Modbus TCP:lla, pilvi laskee tavoitteet ---

globals:
  - id: control_mode_auto
    type: bool
    restore_value: yes
    initial_value: "true"

  - id: cloud_co2_ppm
    type: float
    restore_value: no
    initial_value: "0"

  - id: cloud_humidity_pct
    type: float
    restore_value: no
    initial_value: "0"

  - id: cloud_temp_c
    type: float
    restore_value: no
    initial_value: "0"

  - id: ack_cmd_1
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: ack_cmd_2
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: ack_cmd_3
    type: std::string
    restore_value: no
    initial_value: '""'

script:
  - id: airfi_apply_targets
    mode: single
    parameters:
      supply_pct: int
      exhaust_pct: int
      fireplace: bool
    then:
      - lambda: |-
          auto *modbus = id(airfi_modbus);
          if (modbus == nullptr || !id(airfi_connected).state) {
            ESP_LOGW("airfi", "Ei yhteytta - ohjaus ohitetaan");
            return;
          }
          modbus->write_register(58, fireplace ? 1 : 0);
          modbus->write_register(3, 1);
          modbus->write_register(10, supply_pct);
          modbus->write_register(11, exhaust_pct);
          ESP_LOGI("airfi", "Ohjaus: tulo=%d poisto=%d takka=%d", supply_pct, exhaust_pct, fireplace);

  - id: cloud_sync
    mode: single
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - http_request.post:
                url: !secret sync_url
                max_response_buffer_size: 4096
                request_headers:
                  Authorization: !secret device_auth
                  Content-Type: application/json
                json: !lambda |-
                  root["firmware_version"] = "${firmware_version}";
                  if (id(ack_cmd_1) != "") root["acked_command_ids"].add(id(ack_cmd_1).c_str());
                  if (id(ack_cmd_2) != "") root["acked_command_ids"].add(id(ack_cmd_2).c_str());
                  if (id(ack_cmd_3) != "") root["acked_command_ids"].add(id(ack_cmd_3).c_str());
                  if (id(effective_co2).has_state()) root["state"]["co2_ppm"] = id(effective_co2).state;
                  root["state"]["airfi_online"] = id(airfi_connected).state;
                  if (id(airfi_outdoor_temp).has_state()) root["state"]["outdoor_temp_c"] = id(airfi_outdoor_temp).state;
                  if (id(airfi_supply_hru_temp).has_state()) root["state"]["supply_hru_temp_c"] = id(airfi_supply_hru_temp).state;
                  if (id(airfi_exhaust_temp).has_state()) root["state"]["exhaust_temp_c"] = id(airfi_exhaust_temp).state;
                  if (id(airfi_supply_room_temp).has_state()) root["state"]["supply_room_temp_c"] = id(airfi_supply_room_temp).state;
                  if (id(airfi_exhaust_hru_temp).has_state()) root["state"]["exhaust_hru_temp_c"] = id(airfi_exhaust_hru_temp).state;
                  if (id(airfi_supply_fan).has_state()) root["state"]["fan_supply_pct"] = (int) id(airfi_supply_fan).state;
                  if (id(airfi_exhaust_fan).has_state()) root["state"]["fan_exhaust_pct"] = (int) id(airfi_exhaust_fan).state;
                  if (id(airfi_supply_airflow).has_state()) root["state"]["supply_airflow_m3h"] = (int) id(airfi_supply_airflow).state;
                  if (id(airfi_exhaust_airflow).has_state()) root["state"]["exhaust_airflow_m3h"] = (int) id(airfi_exhaust_airflow).state;
                capture_response: true
                on_response:
                  - lambda: |-
                      id(ack_cmd_1) = "";
                      id(ack_cmd_2) = "";
                      id(ack_cmd_3) = "";

                      if (response->status_code != 200) {
                        ESP_LOGW("sync", "Synkki epaonnistui: HTTP %d", response->status_code);
                        return;
                      }

                      json::parse_json(body, [&](JsonObject root) -> bool {
                        const char *mode = root["control_mode"] | "auto";
                        id(control_mode_auto) = strcmp(mode, "auto") == 0;

                        JsonObject sensor = root["sensor"];
                        if (!sensor.isNull()) {
                          if (sensor.containsKey("co2_ppm")) {
                            id(cloud_co2_ppm) = sensor["co2_ppm"].as<float>();
                            id(effective_co2).publish_state(id(cloud_co2_ppm));
                            ESP_LOGI("sync", "CO2=%.0f", id(cloud_co2_ppm));
                          }
                          if (sensor.containsKey("humidity_pct")) id(cloud_humidity_pct) = sensor["humidity_pct"].as<float>();
                          if (sensor.containsKey("temperature_c")) id(cloud_temp_c) = sensor["temperature_c"].as<float>();
                        }

                        JsonObject ventilation = root["ventilation"];
                        if (!ventilation.isNull()) {
                          if (ventilation.containsKey("fan_supply_pct")) {
                            int pct = ventilation["fan_supply_pct"].as<int>();
                            id(fan_supply_pct).publish_state(pct);
                            ESP_LOGI("sync", "Tulo=%d%%", pct);
                          }
                          if (ventilation.containsKey("fan_exhaust_pct")) {
                            int pct = ventilation["fan_exhaust_pct"].as<int>();
                            id(fan_exhaust_pct).publish_state(pct);
                            ESP_LOGI("sync", "Poisto=%d%%", pct);
                          }
                          if (!ventilation.containsKey("fan_supply_pct") && ventilation.containsKey("fan_speed")) {
                            int pct = ventilation["fan_speed"].as<int>();
                            id(fan_supply_pct).publish_state(pct);
                            id(fan_exhaust_pct).publish_state(pct);
                          }
                          if (ventilation.containsKey("fan_supply_target") && ventilation.containsKey("fan_exhaust_target")) {
                            int supply = ventilation["fan_supply_target"].as<int>();
                            int exhaust = ventilation["fan_exhaust_target"].as<int>();
                            bool fireplace = ventilation["fireplace_active"] | false;
                            id(airfi_apply_targets).execute(supply, exhaust, fireplace);
                          }
                        }

                        JsonArray commands = root["commands"];
                        if (!commands.isNull()) {
                          for (JsonObject cmd : commands) {
                            const char *command = cmd["command"] | "";
                            const char *cmd_id = cmd["id"] | "";
                            if (strcmp(command, "set_mode") == 0) {
                              JsonObject payload = cmd["payload"];
                              const char *m = payload["mode"] | "auto";
                              id(control_mode_auto) = strcmp(m, "auto") == 0;
                              if (cmd_id[0] != '\0' && id(ack_cmd_1) == "") id(ack_cmd_1) = cmd_id;
                              else if (cmd_id[0] != '\0' && id(ack_cmd_2) == "") id(ack_cmd_2) = cmd_id;
                              else if (cmd_id[0] != '\0' && id(ack_cmd_3) == "") id(ack_cmd_3) = cmd_id;
                            }
                            if (strcmp(command, "set_fan_pct") == 0) {
                              JsonObject payload = cmd["payload"];
                              int supply = payload["supply_pct"] | 0;
                              int exhaust = payload["exhaust_pct"] | 0;
                              bool fireplace = payload["fireplace"] | false;
                              id(airfi_apply_targets).execute(supply, exhaust, fireplace);
                              if (cmd_id[0] != '\0' && id(ack_cmd_1) == "") id(ack_cmd_1) = cmd_id;
                              else if (cmd_id[0] != '\0' && id(ack_cmd_2) == "") id(ack_cmd_2) = cmd_id;
                              else if (cmd_id[0] != '\0' && id(ack_cmd_3) == "") id(ack_cmd_3) = cmd_id;
                            }
                            if (strcmp(command, "set_away") == 0) {
                              JsonObject payload = cmd["payload"];
                              bool away = payload["away"] | false;
                              auto *modbus = id(airfi_modbus);
                              if (modbus != nullptr && id(airfi_connected).state) {
                                modbus->write_register(12, away ? 1 : 0);
                                ESP_LOGI("airfi", "Poissa-tila: %d", away ? 1 : 0);
                              }
                              if (cmd_id[0] != '\0' && id(ack_cmd_1) == "") id(ack_cmd_1) = cmd_id;
                              else if (cmd_id[0] != '\0' && id(ack_cmd_2) == "") id(ack_cmd_2) = cmd_id;
                              else if (cmd_id[0] != '\0' && id(ack_cmd_3) == "") id(ack_cmd_3) = cmd_id;
                            }
                          }
                        }
                        return true;
                      });
                  - if:
                      condition:
                        lambda: |-
                          return id(ack_cmd_1) != "" || id(ack_cmd_2) != "" || id(ack_cmd_3) != "";
                      then:
                        - delay: 2s
                        - script.execute: cloud_sync

interval:
  - interval: 60s
    startup_delay: 15s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lvgl.label.update:
                id: lvgl_wifi
                text: !lambda |-
                  if (!id(wifi_ip).has_state()) return std::string("WiFi: yhdistetty");
                  return std::string("WiFi: ") + id(wifi_ip).state;
            - lvgl.label.update:
                id: lvgl_web
                text: !lambda |-
                  if (!id(wifi_ip).has_state()) return std::string("Web: odota IP");
                  return std::string("Web: http://") + id(wifi_ip).state;
          else:
            - lvgl.label.update:
                id: lvgl_wifi
                text: "WiFi: yhdistetaan..."
            - lvgl.label.update:
                id: lvgl_web
                text: "Web: odota verkkoa"

  - interval: 60s
    startup_delay: 45s
    then:
      - script.execute: cloud_sync

# --- ESP-NOW (tulossa) ---
# Keskusyksikkö toimii masterina. Satelliitit (ESP32-C3 jne.) raportoivat
# anturidataa ilman omaa WiFi-yhteyttä. Lisää espnow:-komponentti kun
# ensimmäinen laite on valmis. Katso docs/architecture.md
