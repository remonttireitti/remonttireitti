# Guition ESP32-P4 keskusyksikkö — ESPHome
# Flash: esphome run hub.yaml

substitutions:
  device_name: alykoti-hub
  friendly_name: "Alykoti keskusyksikko"
  firmware_version: "1.6.0"

  upload_port: COM7

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.1.0
  platformio_options:
    upload_port: ${upload_port}
  on_boot:
    - priority: -250
      then:
        - lambda: |-
            // JC1060P470C näytön virransyöttö (Guition-yhteisö)
            gpio_set_direction(GPIO_NUM_27, GPIO_MODE_OUTPUT);
            gpio_set_level(GPIO_NUM_27, 0);
            vTaskDelay(pdMS_TO_TICKS(5));
            gpio_set_level(GPIO_NUM_27, 1);
            vTaskDelay(pdMS_TO_TICKS(10));
            gpio_set_level(GPIO_NUM_27, 0);
            vTaskDelay(pdMS_TO_TICKS(120));
            gpio_set_direction(GPIO_NUM_22, GPIO_MODE_OUTPUT);
            gpio_set_level(GPIO_NUM_22, 0);
            vTaskDelay(pdMS_TO_TICKS(10));
            gpio_set_level(GPIO_NUM_22, 1);
            vTaskDelay(pdMS_TO_TICKS(100));
    - priority: -100
      then:
        - lambda: |-
            const char *reason = "unknown";
            switch (esp_reset_reason()) {
              case ESP_RST_POWERON: reason = "poweron"; break;
              case ESP_RST_SW: reason = "software"; break;
              case ESP_RST_PANIC: reason = "panic"; break;
              case ESP_RST_INT_WDT: reason = "int_wdt"; break;
              case ESP_RST_TASK_WDT: reason = "task_wdt"; break;
              case ESP_RST_WDT: reason = "wdt"; break;
              case ESP_RST_BROWNOUT: reason = "brownout"; break;
              case ESP_RST_SDIO: reason = "sdio"; break;
              default: break;
            }
            ESP_LOGW("boot", "Reset reason: %s", reason);
        - logger.log: "Alykoti keskusyksikko kaynnistyi"
    - priority: 600
      then:
        - delay: 2s
        - light.turn_on: display_backlight
        - lvgl.page.show: iv_page
        - script.execute: update_page_dots

esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHz
  engineering_sample: true
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true
      enable_idf_experimental_features: true
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: "y"
      CONFIG_FREERTOS_THREAD_LOCAL_STORAGE_POINTERS: "1"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "16384"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"

psram:
  mode: hex
  speed: 200MHz

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 0s
  power_save_mode: NONE
  fast_connect: true
  enable_on_boot: true
  min_auth_mode: WPA2
  on_connect:
    - delay: 3s
    - script.execute: fetch_spot_prices
  ap:
    ssid: "Alykoti-Setup"
    password: !secret ota_password

# captive_portal pois: wifi on secrets.yaml:ssa, valttaa ylimaaraisen http-palvelimen

# web_server pois toistaiseksi: vahentaa kuormaa WiFi-yhteyden jalkeen
# web_server:
#   port: 80
#   version: 3
#   include_internal: true

preferences:
  flash_write_interval: 5min

packages:
  vent_display: !include packages/vent-display.yaml

http_request:
  id: http_client
  timeout: 10s
  watchdog_timeout: 30s

external_components:
  - source: github://Gucioo/esphome_modbus_tcp_master
    components: [modbus_tcp_manager]
    refresh: 0s

# --- AirFi Modbus TCP (hub toimii siltana pilven ja lähiverkon välillä) ---
modbus_tcp_manager:
  id: airfi_modbus
  host: !secret airfi_modbus_host
  port: 502
  unit_id: 1

binary_sensor:
  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    name: "AirFi yhteys"
    id: airfi_connected
    internal: true

# --- Naytto JC1060P470 (MIPI-DSI + taustavalo) ---
# ASCII-only tekstit: laitefontti ei tue a/o/2-alaindeksia luotettavasti.

esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: true

i2c:
  - id: bus_a
    sda: GPIO7
    scl: GPIO8
    frequency: 400kHz
    sda_pullup_enabled: false
    scl_pullup_enabled: false

touchscreen:
  - platform: gt911
    id: hub_touch
    i2c_id: bus_a
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    update_interval: 50ms

output:
  - platform: ledc
    pin: GPIO23
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: "Näytön taustavalo"
    id: display_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    gamma_correct: 1.0

display:
  - platform: mipi_dsi
    id: main_display
    model: JC1060P470
    reset_pin:
      number: GPIO05
    update_interval: never
    auto_clear_enabled: false
    hsync_pulse_width: 20

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP-osoite"
      id: wifi_ip
    ssid:
      name: "WiFi-verkko"
      id: wifi_ssid_connected

# --- Airthings: pilvi-API webin kautta (BLE pois, View Plus) ---
# CO2 tulee synkista. BLE tarvitaan vain jos haluat suoran yhteyden anturiin.
sensor:
  - platform: template
    name: "CO2 (kaytossa)"
    id: effective_co2
    unit_of_measurement: "ppm"
    accuracy_decimals: 0
    update_interval: never
    lambda: |-
      if (id(cloud_co2_ppm) > 0) return id(cloud_co2_ppm);
      return {};

  - platform: template
    name: "Tuloilma (AirFi)"
    id: fan_supply_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: never
    lambda: "return {};"

  - platform: template
    name: "Poistoilma (AirFi)"
    id: fan_exhaust_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: never
    lambda: "return {};"

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_outdoor_temp
    name: "AirFi T1 ulkoilma"
    register_address: 3
    function_code: 4
    scale: 0.1
    update_interval: 30s
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_supply_hru_temp
    name: "AirFi T2 tulo LTO"
    register_address: 4
    function_code: 4
    scale: 0.1
    update_interval: 30s
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_exhaust_temp
    name: "AirFi T3 poisto"
    register_address: 5
    function_code: 4
    scale: 0.1
    update_interval: 30s
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_supply_room_temp
    name: "AirFi T4 tulo huone"
    register_address: 6
    function_code: 4
    scale: 0.1
    update_interval: 30s
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_exhaust_hru_temp
    name: "AirFi T5 jateilma"
    register_address: 7
    function_code: 4
    scale: 0.1
    update_interval: 30s
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_exhaust_fan
    name: "AirFi poistonopeus"
    register_address: 11
    function_code: 4
    scale: 1.0
    update_interval: 30s
    internal: true
    on_value:
      - lambda: |-
          id(fan_exhaust_pct).publish_state(x);

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_supply_fan
    name: "AirFi tulonopeus"
    register_address: 12
    function_code: 4
    scale: 1.0
    update_interval: 30s
    internal: true
    on_value:
      - lambda: |-
          id(fan_supply_pct).publish_state(x);

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_supply_airflow
    name: "AirFi tuloilmamaara"
    register_address: 44
    function_code: 4
    scale: 1.0
    update_interval: 60s
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_exhaust_airflow
    name: "AirFi poistoilmamaara"
    register_address: 45
    function_code: 4
    scale: 1.0
    update_interval: 60s
    internal: true

  - platform: template
    name: "LTO lampohyoty"
    id: lto_temp_eff
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      if (!id(airfi_outdoor_temp).has_state() || !id(airfi_supply_hru_temp).has_state()) return {};
      if (!id(airfi_exhaust_temp).has_state()) return {};
      float outdoor = id(airfi_outdoor_temp).state;
      float supply = id(airfi_supply_hru_temp).state;
      float exhaust = id(airfi_exhaust_temp).state;
      float delta = exhaust - outdoor;
      if (fabsf(delta) < 0.3f || exhaust <= outdoor + 0.1f) return {};
      float eff = (supply - outdoor) / delta * 100.0f;
      if (eff < 0.0f) eff = 0.0f;
      if (eff > 100.0f) eff = 100.0f;
      return eff;

# --- AirFi ohjaus: hub kirjoittaa Modbus TCP:lla, pilvi laskee tavoitteet ---

globals:
  - id: control_mode_auto
    type: bool
    restore_value: yes
    initial_value: "true"

  - id: cloud_co2_ppm
    type: float
    restore_value: no
    initial_value: "0"

  - id: cloud_humidity_pct
    type: float
    restore_value: no
    initial_value: "0"

  - id: cloud_temp_c
    type: float
    restore_value: no
    initial_value: "0"

  - id: cloud_pm25
    type: float
    restore_value: no
    initial_value: "0"

  - id: display_co2_band
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: ack_cmd_1
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: ack_cmd_2
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: ack_cmd_3
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: display_mode_label
    type: std::string
    restore_value: no
    initial_value: '"Automaatti"'

  - id: display_timer_text
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: fan_supply_target_g
    type: int
    restore_value: no
    initial_value: "0"

  - id: fan_exhaust_target_g
    type: int
    restore_value: no
    initial_value: "0"

  - id: display_page_idx
    type: int
    restore_value: no
    initial_value: "0"

  - id: el_price_now
    type: float
    restore_value: no
    initial_value: "0"

  - id: el_price_next
    type: float
    restore_value: no
    initial_value: "0"

  - id: el_price_min
    type: float
    restore_value: no
    initial_value: "0"

  - id: el_price_max
    type: float
    restore_value: no
    initial_value: "0"

  - id: el_price_avg
    type: float
    restore_value: no
    initial_value: "0"

script:
  - id: update_page_dots
    mode: restart
    then:
      - lvgl.label.update:
          id: lv_dots_iv
          text: !lambda |-
            return id(display_page_idx) == 0 ? std::string("*IV*  Koti  Sahko  WiFi") : std::string("IV  Koti  Sahko  WiFi");
      - lvgl.label.update:
          id: lv_dots_floor
          text: !lambda |-
            return id(display_page_idx) == 1 ? std::string("IV  *Koti*  Sahko  WiFi") : std::string("IV  Koti  Sahko  WiFi");
      - lvgl.label.update:
          id: lv_dots_price
          text: !lambda |-
            return id(display_page_idx) == 2 ? std::string("IV  Koti  *Sahko*  WiFi") : std::string("IV  Koti  Sahko  WiFi");
      - lvgl.label.update:
          id: lv_dots_wifi
          text: !lambda |-
            return id(display_page_idx) == 3 ? std::string("IV  Koti  Sahko  *WiFi*") : std::string("IV  Koti  Sahko  WiFi");

  - id: nav_page_next
    mode: restart
    then:
      - if:
          condition:
            lambda: "return id(display_page_idx) < 3;"
          then:
            - lambda: "id(display_page_idx)++;"
            - lvgl.page.next:
                animation: MOVE_LEFT
                time: 200ms
            - script.execute: update_page_dots

  - id: nav_page_prev
    mode: restart
    then:
      - if:
          condition:
            lambda: "return id(display_page_idx) > 0;"
          then:
            - lambda: "id(display_page_idx)--;"
            - lvgl.page.previous:
                animation: MOVE_RIGHT
                time: 200ms
            - script.execute: update_page_dots

  - id: fetch_spot_prices
    mode: single
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - http_request.get:
                url: "https://api.spot-hinta.fi/Today?region=FI"
                capture_response: true
                max_response_buffer_size: 8192
                on_response:
                  - lambda: |-
                      if (response->status_code != 200) return;

                      float hours[24] = {0};
                      int counts[24] = {0};
                      float min_c = 9999.0f;
                      float max_c = 0.0f;
                      float sum_c = 0.0f;
                      int sum_n = 0;
                      time_t now_ts = ::time(nullptr);
                      struct tm tm_now;
                      localtime_r(&now_ts, &tm_now);

                      JsonDocument doc = json::parse_json(body);
                      if (doc.isNull() || doc.overflowed()) return;
                      JsonArray arr = doc.as<JsonArray>();
                      if (arr.isNull()) return;

                      for (JsonObject row : arr) {
                        const char *dt = row["DateTime"] | "";
                        if (strlen(dt) < 13) continue;
                        int hour = (dt[11] - '0') * 10 + (dt[12] - '0');
                        if (hour < 0 || hour > 23) continue;
                        float cents = row["PriceWithTax"].as<float>() * 100.0f;
                        hours[hour] += cents;
                        counts[hour]++;
                        if (cents < min_c) min_c = cents;
                        if (cents > max_c) max_c = cents;
                        sum_c += cents;
                        sum_n++;
                      }

                      for (int h = 0; h < 24; h++) {
                        if (counts[h] > 0) hours[h] /= counts[h];
                      }
                      if (sum_n == 0) return;

                      int cur_h = tm_now.tm_hour;
                      int next_h = (cur_h + 1) % 24;
                      id(el_price_now) = counts[cur_h] > 0 ? hours[cur_h] : hours[0];
                      id(el_price_next) = counts[next_h] > 0 ? hours[next_h] : id(el_price_now);
                      id(el_price_min) = min_c;
                      id(el_price_max) = max_c;
                      id(el_price_avg) = sum_c / sum_n;

                      float span = max_c - min_c;
                      if (span < 0.05f) span = 1.0f;

                      auto set_bar = [&](int h, lv_obj_t *bar) {
                        if (counts[h] <= 0) {
                          lv_bar_set_value(bar, 0, LV_ANIM_OFF);
                          return;
                        }
                        int v = (int) ((hours[h] - min_c) / span * 100.0f);
                        if (v < 0) v = 0;
                        if (v > 100) v = 100;
                        lv_bar_set_value(bar, v, LV_ANIM_OFF);
                      };

                      set_bar(0, id(price_bar_0));
                      set_bar(1, id(price_bar_1));
                      set_bar(2, id(price_bar_2));
                      set_bar(3, id(price_bar_3));
                      set_bar(4, id(price_bar_4));
                      set_bar(5, id(price_bar_5));
                      set_bar(6, id(price_bar_6));
                      set_bar(7, id(price_bar_7));
                      set_bar(8, id(price_bar_8));
                      set_bar(9, id(price_bar_9));
                      set_bar(10, id(price_bar_10));
                      set_bar(11, id(price_bar_11));
                      set_bar(12, id(price_bar_12));
                      set_bar(13, id(price_bar_13));
                      set_bar(14, id(price_bar_14));
                      set_bar(15, id(price_bar_15));
                      set_bar(16, id(price_bar_16));
                      set_bar(17, id(price_bar_17));
                      set_bar(18, id(price_bar_18));
                      set_bar(19, id(price_bar_19));
                      set_bar(20, id(price_bar_20));
                      set_bar(21, id(price_bar_21));
                      set_bar(22, id(price_bar_22));
                      set_bar(23, id(price_bar_23));

                      auto fmt_price = [](char *buf, size_t len, float cents) {
                        snprintf(buf, len, "%.2f c/kWh", cents);
                      };
                      char buf[32];
                      fmt_price(buf, sizeof(buf), id(el_price_now));
                      lv_label_set_text(id(price_now), buf);
                      fmt_price(buf, sizeof(buf), id(el_price_next));
                      lv_label_set_text(id(price_next), buf);
                      fmt_price(buf, sizeof(buf), id(el_price_min));
                      lv_label_set_text(id(price_min), buf);
                      fmt_price(buf, sizeof(buf), id(el_price_max));
                      lv_label_set_text(id(price_max), buf);
                      fmt_price(buf, sizeof(buf), id(el_price_avg));
                      lv_label_set_text(id(price_avg), buf);

  - id: display_refresh
    mode: restart
    then:
      - lvgl.label.update:
          id: iv_timer
          text: !lambda |-
            if (id(display_timer_text).empty()) return std::string("");
            return id(display_timer_text);
      - lvgl.label.update:
          id: lv_timer
          text: !lambda |-
            if (id(display_timer_text).empty()) return std::string("");
            return id(display_timer_text);
      - lvgl.label.update:
          id: iv_t1
          text: !lambda |-
            if (!id(airfi_outdoor_temp).has_state()) return std::string("-- C");
            char buf[16];
            snprintf(buf, sizeof(buf), "%.1f C", id(airfi_outdoor_temp).state);
            return std::string(buf);
      - lvgl.label.update:
          id: iv_t2
          text: !lambda |-
            if (!id(airfi_supply_hru_temp).has_state()) return std::string("-- C");
            char buf[16];
            snprintf(buf, sizeof(buf), "%.1f C", id(airfi_supply_hru_temp).state);
            return std::string(buf);
      - lvgl.label.update:
          id: iv_t3
          text: !lambda |-
            if (!id(airfi_exhaust_temp).has_state()) return std::string("-- C");
            char buf[16];
            snprintf(buf, sizeof(buf), "%.1f C", id(airfi_exhaust_temp).state);
            return std::string(buf);
      - lvgl.label.update:
          id: iv_t5
          text: !lambda |-
            if (!id(airfi_exhaust_hru_temp).has_state()) return std::string("-- C");
            char buf[16];
            snprintf(buf, sizeof(buf), "%.1f C", id(airfi_exhaust_hru_temp).state);
            return std::string(buf);
      - lvgl.label.update:
          id: iv_lto
          text: !lambda |-
            if (!id(lto_temp_eff).has_state()) return std::string("-- %");
            char buf[16];
            snprintf(buf, sizeof(buf), "%.0f %%", id(lto_temp_eff).state);
            return std::string(buf);
      - lvgl.label.update:
          id: iv_co2
          text: !lambda |-
            if (id(effective_co2).has_state()) {
              char buf[32];
              snprintf(buf, sizeof(buf), "CO2: %d ppm", (int) id(effective_co2).state);
              return std::string(buf);
            }
            return std::string("CO2: -- ppm");
      - lvgl.label.update:
          id: iv_supply_pct
          text: !lambda |-
            float supply = NAN;
            if (id(fan_supply_pct).has_state()) supply = id(fan_supply_pct).state;
            else if (id(airfi_supply_fan).has_state()) supply = id(airfi_supply_fan).state;
            if (isnan(supply)) return std::string("-- %");
            char buf[16];
            snprintf(buf, sizeof(buf), "%d %%", (int) supply);
            return std::string(buf);
      - lvgl.bar.update:
          id: bar_iv_supply
          value: !lambda |-
            float supply = NAN;
            if (id(fan_supply_pct).has_state()) supply = id(fan_supply_pct).state;
            else if (id(airfi_supply_fan).has_state()) supply = id(airfi_supply_fan).state;
            if (isnan(supply)) return 25;
            int v = (int) supply;
            if (v < 25) v = 25;
            if (v > 100) v = 100;
            return v;
      - lvgl.label.update:
          id: iv_supply_target
          text: !lambda |-
            if (id(fan_supply_target_g) <= 0) return std::string("");
            char buf[24];
            snprintf(buf, sizeof(buf), "Tavoite %d %%", id(fan_supply_target_g));
            return std::string(buf);
      - lvgl.label.update:
          id: iv_exhaust_pct
          text: !lambda |-
            float exhaust = NAN;
            if (id(fan_exhaust_pct).has_state()) exhaust = id(fan_exhaust_pct).state;
            else if (id(airfi_exhaust_fan).has_state()) exhaust = id(airfi_exhaust_fan).state;
            if (isnan(exhaust)) return std::string("-- %");
            char buf[16];
            snprintf(buf, sizeof(buf), "%d %%", (int) exhaust);
            return std::string(buf);
      - lvgl.bar.update:
          id: bar_iv_exhaust
          value: !lambda |-
            float exhaust = NAN;
            if (id(fan_exhaust_pct).has_state()) exhaust = id(fan_exhaust_pct).state;
            else if (id(airfi_exhaust_fan).has_state()) exhaust = id(airfi_exhaust_fan).state;
            if (isnan(exhaust)) return 25;
            int v = (int) exhaust;
            if (v < 25) v = 25;
            if (v > 100) v = 100;
            return v;
      - lvgl.label.update:
          id: iv_exhaust_target
          text: !lambda |-
            if (id(fan_exhaust_target_g) <= 0) return std::string("");
            char buf[24];
            snprintf(buf, sizeof(buf), "Tavoite %d %%", id(fan_exhaust_target_g));
            return std::string(buf);
      - lvgl.label.update:
          id: iv_airfi
          text: !lambda |-
            if (id(airfi_connected).state) return std::string("AirFi online");
            return std::string("AirFi offline");
          text_color: !lambda |-
            if (id(airfi_connected).state) return lv_color_hex(0x065F46);
            return lv_color_hex(0xB45309);
      - lvgl.label.update:
          id: iv_mode
          text: !lambda |-
            return id(display_mode_label);
      - lvgl.label.update:
          id: iv_co2_band
          text: !lambda |-
            return id(display_co2_band);
      - lvgl.label.update:
          id: lv_vent_room
          text: !lambda |-
            float supply = NAN;
            if (id(fan_supply_pct).has_state()) supply = id(fan_supply_pct).state;
            else if (id(airfi_supply_fan).has_state()) supply = id(airfi_supply_fan).state;
            if (isnan(supply)) return std::string("--");
            char buf[24];
            snprintf(buf, sizeof(buf), "Tulo %d%%", (int) supply);
            return std::string(buf);
      - lvgl.label.update:
          id: lv_co2
          text: !lambda |-
            if (id(effective_co2).has_state()) {
              char buf[32];
              snprintf(buf, sizeof(buf), "%d ppm", (int) id(effective_co2).state);
              return std::string(buf);
            }
            return std::string("-- ppm");
      - lvgl.label.update:
          id: lv_room
          text: !lambda |-
            if (id(cloud_temp_c) > 0) {
              char buf[24];
              snprintf(buf, sizeof(buf), "%.1f C", id(cloud_temp_c));
              return std::string(buf);
            }
            if (id(cloud_humidity_pct) > 0) {
              char buf[24];
              snprintf(buf, sizeof(buf), "%.0f %%", id(cloud_humidity_pct));
              return std::string(buf);
            }
            return std::string("");
      - lvgl.label.update:
          id: lv_hub_badge
          text: !lambda |-
            if (wifi::global_wifi_component->is_connected()) return std::string("Hub online");
            return std::string("Hub offline");
          text_color: !lambda |-
            if (wifi::global_wifi_component->is_connected()) return lv_color_hex(0x065F46);
            return lv_color_hex(0xB45309);
      - lvgl.label.update:
          id: lv_airfi
          text: !lambda |-
            if (id(airfi_connected).state) return std::string("AirFi (hub)");
            return std::string("AirFi offline");
          text_color: !lambda |-
            if (id(airfi_connected).state) return lv_color_hex(0x065F46);
            return lv_color_hex(0xB45309);
      - lvgl.label.update:
          id: lv_mode
          text: !lambda |-
            return id(display_mode_label);
      - lvgl.label.update:
          id: lv_co2_band
          text: !lambda |-
            return id(display_co2_band);
      - lvgl.label.update:
          id: lv_firmware
          text: !lambda |-
            return std::string("v") + "${firmware_version}";
      - lvgl.label.update:
          id: lv_wifi_ssid
          text: !lambda |-
            if (!wifi::global_wifi_component->is_connected()) return std::string("Ei yhteytta");
            if (!id(wifi_ssid_connected).has_state()) return std::string("Yhdistetty");
            return id(wifi_ssid_connected).state;
      - lvgl.label.update:
          id: lv_wifi_ip
          text: !lambda |-
            if (!wifi::global_wifi_component->is_connected()) return std::string("--");
            if (!id(wifi_ip).has_state()) return std::string("Odottaa IP");
            return id(wifi_ip).state;

  - id: airfi_apply_targets
    mode: single
    parameters:
      supply_pct: int
      exhaust_pct: int
      fireplace: bool
    then:
      - lambda: |-
          auto *modbus = id(airfi_modbus);
          if (modbus == nullptr || !id(airfi_connected).state) {
            ESP_LOGW("airfi", "Ei yhteytta - ohjaus ohitetaan");
            return;
          }
          modbus->write_register(58, fireplace ? 1 : 0);
          modbus->write_register(3, 1);
          modbus->write_register(10, supply_pct);
          modbus->write_register(11, exhaust_pct);
          ESP_LOGI("airfi", "Ohjaus: tulo=%d poisto=%d takka=%d", supply_pct, exhaust_pct, fireplace);

  - id: cloud_sync
    mode: single
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - http_request.post:
                url: !secret sync_url
                max_response_buffer_size: 4096
                request_headers:
                  Authorization: !secret device_auth
                  Content-Type: application/json
                json: !lambda |-
                  root["firmware_version"] = "${firmware_version}";
                  if (id(ack_cmd_1) != "") root["acked_command_ids"].add(id(ack_cmd_1).c_str());
                  if (id(ack_cmd_2) != "") root["acked_command_ids"].add(id(ack_cmd_2).c_str());
                  if (id(ack_cmd_3) != "") root["acked_command_ids"].add(id(ack_cmd_3).c_str());
                  if (id(effective_co2).has_state()) root["state"]["co2_ppm"] = id(effective_co2).state;
                  root["state"]["airfi_online"] = id(airfi_connected).state;
                  if (id(airfi_outdoor_temp).has_state()) root["state"]["outdoor_temp_c"] = id(airfi_outdoor_temp).state;
                  if (id(airfi_supply_hru_temp).has_state()) root["state"]["supply_hru_temp_c"] = id(airfi_supply_hru_temp).state;
                  if (id(airfi_exhaust_temp).has_state()) root["state"]["exhaust_temp_c"] = id(airfi_exhaust_temp).state;
                  if (id(airfi_supply_room_temp).has_state()) root["state"]["supply_room_temp_c"] = id(airfi_supply_room_temp).state;
                  if (id(airfi_exhaust_hru_temp).has_state()) root["state"]["exhaust_hru_temp_c"] = id(airfi_exhaust_hru_temp).state;
                  if (id(airfi_supply_fan).has_state()) root["state"]["fan_supply_pct"] = (int) id(airfi_supply_fan).state;
                  if (id(airfi_exhaust_fan).has_state()) root["state"]["fan_exhaust_pct"] = (int) id(airfi_exhaust_fan).state;
                  if (id(airfi_supply_airflow).has_state()) root["state"]["supply_airflow_m3h"] = (int) id(airfi_supply_airflow).state;
                  if (id(airfi_exhaust_airflow).has_state()) root["state"]["exhaust_airflow_m3h"] = (int) id(airfi_exhaust_airflow).state;
                capture_response: true
                on_response:
                  - lambda: |-
                      id(ack_cmd_1) = "";
                      id(ack_cmd_2) = "";
                      id(ack_cmd_3) = "";

                      if (response->status_code != 200) {
                        ESP_LOGW("sync", "Synkki epaonnistui: HTTP %d", response->status_code);
                        return;
                      }

                      json::parse_json(body, [&](JsonObject root) -> bool {
                        const char *mode = root["control_mode"] | "auto";
                        id(control_mode_auto) = strcmp(mode, "auto") == 0;

                        JsonObject sensor = root["sensor"];
                        if (!sensor.isNull()) {
                          if (sensor.containsKey("co2_ppm")) {
                            id(cloud_co2_ppm) = sensor["co2_ppm"].as<float>();
                            id(effective_co2).publish_state(id(cloud_co2_ppm));
                            ESP_LOGI("sync", "CO2=%.0f", id(cloud_co2_ppm));
                          }
                          if (sensor.containsKey("humidity_pct")) id(cloud_humidity_pct) = sensor["humidity_pct"].as<float>();
                          if (sensor.containsKey("temperature_c")) id(cloud_temp_c) = sensor["temperature_c"].as<float>();
                          if (sensor.containsKey("pm25_ugm3")) id(cloud_pm25) = sensor["pm25_ugm3"].as<float>();
                        }

                        JsonObject ventilation = root["ventilation"];
                        if (!ventilation.isNull()) {
                          if (ventilation.containsKey("fan_supply_pct")) {
                            int pct = ventilation["fan_supply_pct"].as<int>();
                            id(fan_supply_pct).publish_state(pct);
                            ESP_LOGI("sync", "Tulo=%d%%", pct);
                          }
                          if (ventilation.containsKey("fan_exhaust_pct")) {
                            int pct = ventilation["fan_exhaust_pct"].as<int>();
                            id(fan_exhaust_pct).publish_state(pct);
                            ESP_LOGI("sync", "Poisto=%d%%", pct);
                          }
                          if (ventilation.containsKey("fan_supply_target")) {
                            id(fan_supply_target_g) = ventilation["fan_supply_target"].as<int>();
                          }
                          if (ventilation.containsKey("fan_exhaust_target")) {
                            id(fan_exhaust_target_g) = ventilation["fan_exhaust_target"].as<int>();
                          }
                          if (!ventilation.containsKey("fan_supply_pct") && ventilation.containsKey("fan_speed")) {
                            int pct = ventilation["fan_speed"].as<int>();
                            id(fan_supply_pct).publish_state(pct);
                            id(fan_exhaust_pct).publish_state(pct);
                          }
                          if (ventilation.containsKey("fan_supply_target") && ventilation.containsKey("fan_exhaust_target")) {
                            int supply = ventilation["fan_supply_target"].as<int>();
                            int exhaust = ventilation["fan_exhaust_target"].as<int>();
                            bool fireplace = ventilation["fireplace_active"] | false;
                            id(airfi_apply_targets).execute(supply, exhaust, fireplace);
                          }
                        }

                        JsonObject display = root["display"];
                        if (!display.isNull()) {
                          if (display.containsKey("mode_label")) {
                            id(display_mode_label) = display["mode_label"].as<const char *>();
                          }
                          if (display.containsKey("timer_text") && !display["timer_text"].isNull()) {
                            id(display_timer_text) = display["timer_text"].as<const char *>();
                          } else {
                            id(display_timer_text) = "";
                          }
                          if (display.containsKey("co2_band_label") && !display["co2_band_label"].isNull()) {
                            id(display_co2_band) = display["co2_band_label"].as<const char *>();
                          } else {
                            id(display_co2_band) = "";
                          }
                        }

                        JsonArray commands = root["commands"];
                        if (!commands.isNull()) {
                          for (JsonObject cmd : commands) {
                            const char *command = cmd["command"] | "";
                            const char *cmd_id = cmd["id"] | "";
                            if (strcmp(command, "set_mode") == 0) {
                              JsonObject payload = cmd["payload"];
                              const char *m = payload["mode"] | "auto";
                              id(control_mode_auto) = strcmp(m, "auto") == 0;
                              if (cmd_id[0] != '\0' && id(ack_cmd_1) == "") id(ack_cmd_1) = cmd_id;
                              else if (cmd_id[0] != '\0' && id(ack_cmd_2) == "") id(ack_cmd_2) = cmd_id;
                              else if (cmd_id[0] != '\0' && id(ack_cmd_3) == "") id(ack_cmd_3) = cmd_id;
                            }
                            if (strcmp(command, "set_fan_pct") == 0) {
                              JsonObject payload = cmd["payload"];
                              int supply = payload["supply_pct"] | 0;
                              int exhaust = payload["exhaust_pct"] | 0;
                              bool fireplace = payload["fireplace"] | false;
                              id(airfi_apply_targets).execute(supply, exhaust, fireplace);
                              if (cmd_id[0] != '\0' && id(ack_cmd_1) == "") id(ack_cmd_1) = cmd_id;
                              else if (cmd_id[0] != '\0' && id(ack_cmd_2) == "") id(ack_cmd_2) = cmd_id;
                              else if (cmd_id[0] != '\0' && id(ack_cmd_3) == "") id(ack_cmd_3) = cmd_id;
                            }
                            if (strcmp(command, "set_away") == 0) {
                              JsonObject payload = cmd["payload"];
                              bool away = payload["away"] | false;
                              auto *modbus = id(airfi_modbus);
                              if (modbus != nullptr && id(airfi_connected).state) {
                                modbus->write_register(12, away ? 1 : 0);
                                ESP_LOGI("airfi", "Poissa-tila: %d", away ? 1 : 0);
                              }
                              if (cmd_id[0] != '\0' && id(ack_cmd_1) == "") id(ack_cmd_1) = cmd_id;
                              else if (cmd_id[0] != '\0' && id(ack_cmd_2) == "") id(ack_cmd_2) = cmd_id;
                              else if (cmd_id[0] != '\0' && id(ack_cmd_3) == "") id(ack_cmd_3) = cmd_id;
                            }
                          }
                        }
                        return true;
                      });
                  - script.execute: display_refresh
                  - if:
                      condition:
                        lambda: |-
                          return id(ack_cmd_1) != "" || id(ack_cmd_2) != "" || id(ack_cmd_3) != "";
                      then:
                        - delay: 2s
                        - script.execute: cloud_sync

interval:
  - interval: 3s
    then:
      - script.execute: display_refresh

  - interval: 60s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - script.execute: fetch_spot_prices

  - interval: 20s
    startup_delay: 45s
    then:
      - script.execute: cloud_sync

