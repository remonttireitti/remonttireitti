# Guition ESP32-P4 keskusyksikkö — ESPHome
# Flash: esphome run hub.yaml

substitutions:
  device_name: alykoti-hub
  friendly_name: "Alykoti keskusyksikko"
  firmware_version: "1.8.0"

  upload_port: COM7

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.1.0
  platformio_options:
    upload_port: ${upload_port}
  on_boot:
    - priority: -250
      then:
        - lambda: |-
            // JC1060P470C näytön virransyöttö (Guition-yhteisö)
            gpio_set_direction(GPIO_NUM_27, GPIO_MODE_OUTPUT);
            gpio_set_level(GPIO_NUM_27, 0);
            vTaskDelay(pdMS_TO_TICKS(5));
            gpio_set_level(GPIO_NUM_27, 1);
            vTaskDelay(pdMS_TO_TICKS(10));
            gpio_set_level(GPIO_NUM_27, 0);
            vTaskDelay(pdMS_TO_TICKS(120));
            gpio_set_direction(GPIO_NUM_22, GPIO_MODE_OUTPUT);
            gpio_set_level(GPIO_NUM_22, 0);
            vTaskDelay(pdMS_TO_TICKS(10));
            gpio_set_level(GPIO_NUM_22, 1);
            vTaskDelay(pdMS_TO_TICKS(100));
    - priority: -100
      then:
        - lambda: |-
            const char *reason = "unknown";
            switch (esp_reset_reason()) {
              case ESP_RST_POWERON: reason = "poweron"; break;
              case ESP_RST_SW: reason = "software"; break;
              case ESP_RST_PANIC: reason = "panic"; break;
              case ESP_RST_INT_WDT: reason = "int_wdt"; break;
              case ESP_RST_TASK_WDT: reason = "task_wdt"; break;
              case ESP_RST_WDT: reason = "wdt"; break;
              case ESP_RST_BROWNOUT: reason = "brownout"; break;
              case ESP_RST_SDIO: reason = "sdio"; break;
              default: break;
            }
            ESP_LOGW("boot", "Reset reason: %s", reason);
        - logger.log: "Alykoti keskusyksikko kaynnistyi"
    - priority: 600
      then:
        - delay: 2s
        - light.turn_on: display_backlight
        - lvgl.page.show: iv_page

esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHz
  engineering_sample: true
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true
      enable_idf_experimental_features: true
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: "y"
      CONFIG_FREERTOS_THREAD_LOCAL_STORAGE_POINTERS: "1"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "16384"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"

psram:
  mode: hex
  speed: 200MHz

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 0s
  power_save_mode: NONE
  fast_connect: true
  enable_on_boot: true
  min_auth_mode: WPA2
  on_connect:
    - delay: 3s
    - script.execute: fetch_spot_prices
  ap:
    ssid: "Alykoti-Setup"
    password: !secret ota_password

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Helsinki

# captive_portal pois: wifi on secrets.yaml:ssa, valttaa ylimaaraisen http-palvelimen

# web_server pois toistaiseksi: vahentaa kuormaa WiFi-yhteyden jalkeen
# web_server:
#   port: 80
#   version: 3
#   include_internal: true

preferences:
  flash_write_interval: 5min

packages:
  vent_display: !include packages/vent-display.yaml

http_request:
  id: http_client
  timeout: 10s
  watchdog_timeout: 30s

external_components:
  - source: github://Gucioo/esphome_modbus_tcp_master
    components: [modbus_tcp_manager]
    refresh: 0s

# --- AirFi Modbus TCP (hub toimii siltana pilven ja lähiverkon välillä) ---
modbus_tcp_manager:
  id: airfi_modbus
  host: !secret airfi_modbus_host
  port: 502
  unit_id: 1

binary_sensor:
  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    name: "AirFi yhteys"
    id: airfi_connected
    internal: true

  - platform: template
    name: "AirFi data ok"
    id: airfi_data_ok
    internal: true
    lambda: "return id(airfi_online_flag);"

# --- Naytto JC1060P470 (MIPI-DSI + taustavalo) ---
# ASCII-only tekstit: laitefontti ei tue a/o/2-alaindeksia luotettavasti.

esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: true

i2c:
  - id: bus_a
    sda: GPIO7
    scl: GPIO8
    frequency: 400kHz
    sda_pullup_enabled: false
    scl_pullup_enabled: false

touchscreen:
  - platform: gt911
    id: hub_touch
    display: main_display
    i2c_id: bus_a
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    calibration:
      x_min: 0
      x_max: 1024
      y_min: 0
      y_max: 600
    on_touch:
      - lambda: |-
          id(swipe_active) = true;
          id(swipe_x0) = touch.x;
          id(swipe_y0) = touch.y;
          id(swipe_x1) = touch.x;
          id(swipe_y1) = touch.y;
    on_update:
      - lambda: |-
          for (auto t : touches) {
            if (t.state <= 2) {
              id(swipe_x1) = t.x;
              id(swipe_y1) = t.y;
            }
          }
    on_release:
      - script.execute: handle_swipe_release

output:
  - platform: ledc
    pin: GPIO23
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: "Näytön taustavalo"
    id: display_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    gamma_correct: 1.0

display:
  - platform: mipi_dsi
    id: main_display
    model: JC1060P470
    reset_pin:
      number: GPIO05
    update_interval: never
    auto_clear_enabled: false
    hsync_pulse_width: 20

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP-osoite"
      id: wifi_ip
    ssid:
      name: "WiFi-verkko"
      id: wifi_ssid_connected

# --- Airthings: pilvi-API webin kautta (BLE pois, View Plus) ---
# CO2 tulee synkista. BLE tarvitaan vain jos haluat suoran yhteyden anturiin.
sensor:
  - platform: template
    name: "CO2 (kaytossa)"
    id: effective_co2
    unit_of_measurement: "ppm"
    accuracy_decimals: 0
    update_interval: never
    lambda: |-
      if (id(cloud_co2_ppm) > 0) return id(cloud_co2_ppm);
      return {};

  - platform: template
    name: "Tuloilma (AirFi)"
    id: fan_supply_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: never
    lambda: "return {};"

  - platform: template
    name: "Poistoilma (AirFi)"
    id: fan_exhaust_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: never
    lambda: "return {};"

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_outdoor_temp
    name: "AirFi T1 ulkoilma"
    register_address: 3
    function_code: 4
    scale: 0.1
    update_interval: never
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_supply_hru_temp
    name: "AirFi T2 varalla"
    register_address: 4
    function_code: 4
    scale: 0.1
    update_interval: never
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_exhaust_temp
    name: "AirFi T3 poisto"
    register_address: 5
    function_code: 4
    scale: 0.1
    update_interval: never
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_exhaust_hru_temp
    name: "AirFi T4 jateilma"
    register_address: 6
    function_code: 4
    scale: 0.1
    update_interval: never
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_supply_room_temp
    name: "AirFi T5 tulo asuntoon"
    register_address: 7
    function_code: 4
    scale: 0.1
    update_interval: never
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_exhaust_fan
    name: "AirFi poistonopeus"
    register_address: 10
    function_code: 3
    scale: 1.0
    update_interval: 30s
    internal: true
    on_value:
      - lambda: |-
          id(fan_exhaust_pct).publish_state(x);

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_supply_fan
    name: "AirFi tulonopeus"
    register_address: 9
    function_code: 3
    scale: 1.0
    update_interval: 30s
    internal: true
    on_value:
      - lambda: |-
          id(fan_supply_pct).publish_state(x);

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_supply_airflow
    name: "AirFi tuloilmamaara"
    register_address: 44
    function_code: 4
    scale: 1.0
    update_interval: 60s
    internal: true

  - platform: modbus_tcp_manager
    modbus_tcp_id: airfi_modbus
    id: airfi_exhaust_airflow
    name: "AirFi poistoilmamaara"
    register_address: 45
    function_code: 4
    scale: 1.0
    update_interval: 60s
    internal: true

  - platform: template
    name: "LTO lampohyoty"
    id: lto_temp_eff
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      if (!id(airfi_outdoor_temp).has_state() || !id(airfi_supply_room_temp).has_state()) return {};
      if (!id(airfi_exhaust_temp).has_state()) return {};
      float outdoor = id(airfi_outdoor_temp).state;
      float supply = id(airfi_supply_room_temp).state;
      float exhaust = id(airfi_exhaust_temp).state;
      if (outdoor < -50.0f || outdoor > 80.0f) return {};
      if (supply < -50.0f || supply > 80.0f) return {};
      if (exhaust < -50.0f || exhaust > 80.0f) return {};
      float delta = exhaust - outdoor;
      if (fabsf(delta) < 0.3f || exhaust <= outdoor + 0.1f) return {};
      float eff = (supply - outdoor) / delta * 100.0f;
      if (eff < 0.0f) eff = 0.0f;
      if (eff > 100.0f) eff = 100.0f;
      return eff;

# --- AirFi ohjaus: hub kirjoittaa Modbus TCP:lla, pilvi laskee tavoitteet ---

